<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/static/bootstrap-4.4.1-dist/css/bootstrap.css">
    <style>
        .login-box{
            margin-top: 100px;
            margin-left: auto;
            margin-right: auto;
            width: 450px;
            border: 1px solid #ddd;
            padding: 15px 30px 30px 30px;
        }
        .login-box h2{
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>用户登录</h2>
    <form method="post">
        <div class="form-group">
            <select name="role" class="form-control">
                <option value="1">客户</option>
                <option value="2">管理员</option>
            </select>
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" class="form-control" placeholder="手机号" name="mobile"/>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-control" name="pwd" placeholder="密码" >
        </div>
        <input type="submit" class="btn btn-primary" value="登 录"/>
        <span style="color:red;">{{ error }}</span>
    </form>
</div>   
        <script src="/static/jquery-4.0.0.min.js"></script>
        <script src="/static/bootstrap-4.4.1-dist/js/bootstrap.js"></script>

</body>
</html>
